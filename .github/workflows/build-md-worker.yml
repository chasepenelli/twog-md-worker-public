name: Build TWOG MD Worker Public Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-md-worker.yml"
      - "Dockerfile"
      - "requirements.txt"
      - "src/**"
      - "test_input_*.json"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/chasepenelli/twog-md-worker-public

jobs:
  build-test-publish:
    name: Build, test, and publish public worker image
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local test image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: twog-md-worker-public:test

      - name: Run positive-control worker test
        run: |
          docker run --rm twog-md-worker-public:test \
            python /app/src/handler.py /app/test_input_positive_control.json \
            > positive-control-output.json
          python - <<'PY'
          import json
          payload = json.load(open("positive-control-output.json", encoding="utf-8"))
          if payload.get("status") != "completed":
              raise SystemExit(json.dumps(payload, indent=2)[:4000])
          stages = {stage.get("stage"): stage.get("status") for stage in payload.get("stages", [])}
          if stages.get("ligand_3d") != "completed" or stages.get("ligand_pdbqt") != "completed":
              raise SystemExit(json.dumps(payload, indent=2)[:4000])
          PY

      - name: Run pazopanib/KDR ligand-prep worker test
        run: |
          docker run --rm twog-md-worker-public:test \
            python /app/src/handler.py /app/test_input_pazopanib_kdr.json \
            > pazopanib-kdr-output.json
          python - <<'PY'
          import json
          payload = json.load(open("pazopanib-kdr-output.json", encoding="utf-8"))
          if payload.get("status") != "completed":
              raise SystemExit(json.dumps(payload, indent=2)[:4000])
          stages = {stage.get("stage"): stage.get("status") for stage in payload.get("stages", [])}
          if stages.get("ligand_3d") != "completed" or stages.get("ligand_pdbqt") != "completed":
              raise SystemExit(json.dumps(payload, indent=2)[:4000])
          PY

      - name: Verify docking binaries
        run: |
          docker run --rm twog-md-worker-public:test \
            python -c "import shutil; assert shutil.which('vina'); assert shutil.which('mk_prepare_receptor.py')"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish public GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:smoke-v1
